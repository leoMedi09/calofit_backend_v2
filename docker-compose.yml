
services:
  # Base de Datos PostgreSQL
  db:
    image: postgres:15
    container_name: calofit_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: leomeflo09
      POSTGRES_DB: BD_Calofit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: calofit_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Tu Backend FastAPI
  backend:
    build: 
      context: "./" #./calofit_backend
      dockerfile: Dockerfile
    container_name: calofit_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:leomeflo09@db:5432/BD_Calofit
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env #./calofit_backend/.env
    volumes:
      - .:/app #/app/.env#./calofit_backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Frontend Flutter Web
  # frontend:
  #   build:
  #     context: ./calofit_frontend
  #     dockerfile: Dockerfile
  #   container_name: calofit_frontend
  #   restart: always
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
  redis_data: